# SonarQube Community Build + community-branch-plugin，元数据库接阿里云 RDS PostgreSQL。
# 用法：先准备好 .env（见 .env.example）与主机内核参数（见 host-setup.sh），再 `docker compose up -d`。
services:
  # 启动前把分支插件下载进 extensions 卷（插件版本由 .env 钉死）。
  sonarqube-init:
    image: curlimages/curl:8.11.1
    user: "0:0"
    volumes:
      - sonarqube_extensions:/opt/sonarqube/extensions
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mkdir -p /opt/sonarqube/extensions/plugins &&
        curl -fSL -o /opt/sonarqube/extensions/plugins/sonarqube-community-branch-plugin-${PLUGIN_VERSION}.jar
        https://github.com/mc1arke/sonarqube-community-branch-plugin/releases/download/${PLUGIN_VERSION}/sonarqube-community-branch-plugin-${PLUGIN_VERSION}.jar

  sonarqube:
    image: sonarqube:${SONARQUBE_TAG}
    depends_on:
      sonarqube-init:
        condition: service_completed_successfully
    ports:
      - "${SONAR_PORT}:9000"
    environment:
      # ---- 连接 RDS PostgreSQL ----
      SONAR_JDBC_URL: "jdbc:postgresql://${RDS_HOST}:${RDS_PORT}/${RDS_DB}"
      SONAR_JDBC_USERNAME: "${RDS_USER}"
      SONAR_JDBC_PASSWORD: "${RDS_PASSWORD}"
      # ---- 启用 community-branch-plugin 的 javaagent（web + ce 各一条，版本要和 .env 一致）----
      SONAR_WEB_JAVAADDITIONALOPTS: "-javaagent:./extensions/plugins/sonarqube-community-branch-plugin-${PLUGIN_VERSION}.jar=web"
      SONAR_CE_JAVAADDITIONALOPTS: "-javaagent:./extensions/plugins/sonarqube-community-branch-plugin-${PLUGIN_VERSION}.jar=ce"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 8192
        hard: 8192
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
